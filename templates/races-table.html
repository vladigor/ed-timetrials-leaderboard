{% extends "base.html" %}

{% block content %}
  <main class="page-wrapper">

    <h1 style="margin-bottom: 1rem">Races List</h1>

    <section class="filter-bar" aria-label="Filters">

      <div class="filter-group">
        <input type="text" id="filter-search" placeholder="Filter by name, system, type..." aria-label="Search races" style="min-width:240px">
      </div>

      <div class="filter-group" style="justify-content:flex-end">
        <label class="filter-toggle">
          <input type="checkbox" id="filter-hide-dw3">
          Hide DW3 races
        </label>
        <label class="filter-toggle">
          <input type="checkbox" id="filter-hide-horizons">
          Hide Horizons races
        </label>
        <label class="filter-toggle" id="filter-cmdr-races-group" style="display:none">
          <input type="checkbox" id="filter-cmdr-races">
          Only races I've done
        </label>
        <label class="filter-toggle">
          <input type="checkbox" id="filter-active">
          Only races with activity in the last 7 days
        </label>
      </div>

    </section>

    <section class="filter-bar" aria-label="Current System" style="margin-top: 0.5rem">
      <div class="filter-group">
        <label for="current-system" style="margin-right: 0.5rem; white-space: nowrap;">Your current system:</label>
        <div class="nendy-autocomplete">
          <input type="text" id="current-system" class="nendy-input" placeholder="e.g. Deciat"
                 aria-label="Current system" autocomplete="off" spellcheck="false" style="min-width:360px">
          <ul class="nendy-suggestions" id="system-suggestions" hidden></ul>
        </div>
        <button id="find-system-btn" class="btn-chip">Find</button>
      </div>
    </section>

    <div class="status-bar">
      <span id="race-count" style="font-weight: bold; color: var(--text)"></span>
    </div>

    <div id="races-table-container">
      <p class="loading-placeholder">Loading time trials…</p>
    </div>

  </main>
{% endblock %}

{% block extra_scripts %}
  <script type="module" src="/static/js/races-table.js?v={{ v }}"></script>
{% endblock %}
