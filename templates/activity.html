{% extends "base.html" %}

{% block title %}Recent Activity — Elite TT Leaderboards{% endblock %}

{% block content %}
  <main class="page-wrapper">

    <div class="breadcrumb">
      <a href="/">All Time Trials</a>
      <span class="sep">›</span>
      <span>Recent Activity</span>
    </div>

    <h1 class="page-title">Recent Activity</h1>

    <div class="status-bar">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Loading…</span>
    </div>

    <div id="activity-container">
      <p class="loading-placeholder">Loading recent activity…</p>
    </div>

  </main>
{% endblock %}

{% block extra_scripts %}
  <script type="module" src="/static/js/activity.js?v={{ v }}"></script>
{% endblock %}
