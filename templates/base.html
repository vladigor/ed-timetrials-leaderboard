<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Elite Dangerous — Time Trials Leaderboards{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css?v={{ v }}">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="page-wrapper">
      <div class="inner">
        <div class="site-logo">
          <a href="/" class="site-logo-link">Elite Dangerous Time Trials Leaderboards</a>
        </div>
        <div class="header-links">
          <a href="/activity">Activity</a>
          <span class="sep">&middot;</span>
          <a href="/stats">Stats</a>
          <span class="sep">&middot;</span>
          <a href="/guide">Guide</a>
          <span class="sep">&middot;</span>
          <a href="/about">About</a>
        </div>        
      </div>
    </div>
  </header>

  {% block content %}{% endblock %}

  <footer class="site-footer">
    <div class="page-wrapper">
      <a href="/">Elite TT Leaderboards</a>
      <span class="sep">&middot;</span>
      <a href="/activity">Activity</a>
      <span class="sep">&middot;</span>
      <a href="/stats">Stats</a>
      <!-- <span class="sep">&middot;</span>
      <a href="/guide">Racing Guide</a> -->
      <span class="sep">&middot;</span>
      <a href="/about">About</a>
      <span class="sep">&middot;</span>
      <a href="https://github.com/vladigor/ed-timetrials-leaderboard/issues" target="_blank" rel="noopener">Feedback &amp; bug reports</a>
      <span class="sep">&middot;</span>
      <span class="build-ver">Build {{ v }}</span>
    </div>
  </footer>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
