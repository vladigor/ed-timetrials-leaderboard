<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Trial — Elite TT Leaderboards</title>
  <link rel="stylesheet" href="/static/css/style.css?v={{ v }}">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
  <header class="site-header">
    <div class="page-wrapper">
      <div class="inner">
        <div class="site-logo">
          <a href="/" class="site-logo-link">Elite Dangerous Time Trials Leaderboards</a>
        </div>
      </div>
    </div>
  </header>

  <div class="portrait-banner" id="portrait-banner">
    📱 Best viewed in landscape mode
  </div>

  <main class="page-wrapper">

    <div class="breadcrumb">
      <a id="back-link" href="/">All Time Trials</a>
      <span class="sep">›</span>
      <span id="race-breadcrumb">Loading…</span>
    </div>

    <div class="race-detail-header-wrapper">
      <div class="race-detail-header">
        <h1 id="race-title">Loading…</h1>
        <div class="meta" id="race-meta"></div>
        <div class="constraints-list" id="race-constraints"></div>
        <div class="race-info-row" id="race-info"></div>
        <p class="race-description" id="race-description"></p>
        <div class="status-bar">
          <div class="dot" id="status-dot"></div>
          <span id="status-text">Loading…</span>
        </div>
      </div>
      <div class="race-map-container" id="race-map-container" style="display: none;">
        <a id="race-map-link" href="#" target="_blank">
          <img id="race-map-thumbnail" src="" alt="Race map" />
        </a>
      </div>
    </div>

    <div id="results-layout" class="results-layout">
      <p class="loading-placeholder">Loading results…</p>
    </div>

    <div id="race-rivalry" style="display:none"></div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script type="module" src="/static/js/race.js?v={{ v }}"></script>

  <footer class="site-footer">
    <div class="page-wrapper">
      <span>Elite TT Leaderboards</span>
      <span class="sep">&middot;</span>
      <a href="/about">About</a>
      <span class="sep">&middot;</span>
      <a href="/stats">Stats</a>
      <span class="sep">&middot;</span>
      <a href="https://github.com/vladigor/ed-timetrials-leaderboard/issues" target="_blank" rel="noopener">Feedback &amp; bug reports</a>
      <span class="sep">&middot;</span>
      <span class="build-ver">Build {{ v }}</span>
    </div>
  </footer>
</body>
</html>
